<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amber: #F2A24A;
      --sienna: #E8855A;
      --wheat: #F5DEB3;
      --walnut: #2C1A0E;
      --walnut-mid: #3D2410;
      --walnut-light: #4A2E18;
      --rust: #7A3B1E;
      --green: #6FCF97;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--walnut);
      color: var(--wheat);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding-bottom: 64px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px 18px;
      border-bottom: 1px solid var(--walnut-light);
      position: sticky;
      top: 0;
      background: var(--walnut);
      z-index: 10;
    }
    .header-left h1 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--amber);
    }
    .header-left p {
      font-size: 11px;
      color: var(--rust);
      margin-top: 2px;
    }
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--walnut-mid);
      border: 1px solid var(--walnut-light);
      color: var(--wheat);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .add-btn:hover { border-color: var(--amber); color: var(--amber); }

    /* Grid */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 16px;
      padding: 24px 28px;
    }
    @media (max-width: 500px) {
      #grid { grid-template-columns: 1fr; padding: 14px; }
      header { padding: 16px 14px 14px; }
    }

    /* Card */
    .card {
      background: var(--walnut-mid);
      border: 1px solid var(--walnut-light);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--walnut-light);
      gap: 12px;
    }
    .card-name {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      color: var(--amber);
      font-weight: 600;
      line-height: 1.2;
    }
    .card-desc {
      font-size: 11px;
      color: var(--rust);
      margin-top: 3px;
    }
    .card-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
    }
    .stale-badge {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .remove-btn {
      background: none;
      border: none;
      color: var(--rust);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 2px;
      border-radius: 4px;
      transition: color 0.1s;
    }
    .remove-btn:hover { color: var(--sienna); }

    /* Columns inside card */
    .cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .cols.single { grid-template-columns: 1fr; }
    .mini-col {
      padding: 12px 14px 14px;
      border-right: 1px solid var(--walnut-light);
    }
    .mini-col:last-child { border-right: none; }
    .mini-col-header {
      font-size: 10px;
      font-weight: 600;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    ol.mini-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    ol.mini-list li {
      display: flex;
      gap: 7px;
      align-items: flex-start;
      font-size: 12px;
      color: var(--wheat);
      line-height: 1.35;
    }
    .num {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      background: rgba(242,162,74,0.18);
      color: var(--amber);
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .no-priorities {
      font-size: 11px;
      color: var(--rust);
      font-style: italic;
    }

    /* Empty state */
    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 65vh;
      text-align: center;
      padding: 32px;
      gap: 14px;
    }
    #empty h2 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 20px;
      color: var(--amber);
      opacity: 0.55;
    }
    #empty p {
      font-size: 13px;
      color: var(--rust);
      line-height: 1.65;
      max-width: 300px;
    }
    #empty code {
      font-family: monospace;
      background: var(--walnut-mid);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--wheat);
    }

    /* Drop overlay */
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,26,14,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .drop-box {
      border: 2px dashed var(--amber);
      border-radius: 16px;
      padding: 52px 72px;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--amber);
      text-align: center;
    }
    .drop-box p {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-style: normal;
      font-size: 12px;
      color: var(--rust);
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Projects</h1>
    <p id="subtitle">Loading…</p>
  </div>
  <label class="add-btn">
    + Add Tracker
    <input id="file-input" type="file" accept=".html" multiple hidden />
  </label>
</header>

<div id="empty">
  <h2>No projects yet</h2>
  <p>Drop a <code>*-tracker.html</code> file here, or click <strong>+ Add Tracker</strong> to get started.</p>
  <p>Each project's tracker file includes a machine-readable data block that populates this dashboard automatically.</p>
</div>

<div id="grid"></div>

<div id="drop-overlay">
  <div class="drop-box">
    Drop tracker files here
    <p>*.html files with tracker-data blocks</p>
  </div>
</div>

<script>
  const STORE_KEY = 'ptrackers_v1'

  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || [] }
    catch { return [] }
  }

  function save(data) {
    localStorage.setItem(STORE_KEY, JSON.stringify(data))
  }

  function parseTrackerHTML(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html')
    const el = doc.querySelector('#tracker-data')
    if (!el) throw new Error('No #tracker-data block found. Is this a tracker file?')
    return JSON.parse(el.textContent)
  }

  function staleInfo(dateStr) {
    if (!dateStr) return { label: 'No date', color: 'var(--rust)' }
    const days = Math.floor((Date.now() - new Date(dateStr)) / 86400000)
    if (days <= 0)  return { label: 'Updated today',           color: 'var(--green)'  }
    if (days === 1) return { label: 'Updated yesterday',        color: 'var(--amber)'  }
    if (days < 7)   return { label: `${days} days ago`,         color: 'var(--amber)'  }
    if (days < 14)  return { label: '1 week ago — update due',  color: 'var(--sienna)' }
    const w = Math.floor(days / 7)
    return { label: `${w} weeks ago — stale`, color: 'var(--sienna)' }
  }

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function cardHTML(p) {
    const { label, color } = staleInfo(p.updated)
    const cols = (p.columns || [])
    const colsHTML = cols.map(col => {
      const items = (col.priorities || []).slice(0, 3)
      const list = items.length
        ? `<ol class="mini-list">${items.map((pr, i) =>
            `<li><span class="num">${i+1}</span>${esc(pr.title)}</li>`
          ).join('')}</ol>`
        : `<p class="no-priorities">No priorities set</p>`
      return `<div class="mini-col">
        <div class="mini-col-header">${esc(col.name)}</div>
        ${list}
      </div>`
    }).join('')

    return `<div class="card">
      <div class="card-top">
        <div>
          <div class="card-name">${esc(p.project)}</div>
          <div class="card-desc">${esc(p.description || '')}</div>
        </div>
        <div class="card-meta">
          <span class="stale-badge" style="color:${color}">${esc(label)}</span>
          <button class="remove-btn" data-id="${esc(p.project)}" title="Remove project">×</button>
        </div>
      </div>
      <div class="cols${cols.length === 1 ? ' single' : ''}">${colsHTML}</div>
    </div>`
  }

  function render() {
    const projects = load()
    const grid = document.getElementById('grid')
    const empty = document.getElementById('empty')
    const subtitle = document.getElementById('subtitle')

    subtitle.textContent = projects.length === 0
      ? 'No projects'
      : `${projects.length} project${projects.length > 1 ? 's' : ''}`

    if (projects.length === 0) {
      grid.innerHTML = ''
      empty.style.display = 'flex'
      return
    }

    empty.style.display = 'none'
    grid.innerHTML = projects.map(cardHTML).join('')

    grid.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id
        if (!confirm(`Remove "${id}" from the dashboard?\n\nThis only removes it from the view — the tracker file is unchanged.`)) return
        save(load().filter(p => p.project !== id))
        render()
      })
    })
  }

  async function handleFiles(files) {
    const projects = load()
    let added = 0
    for (const file of [...files]) {
      if (!file.name.endsWith('.html')) continue
      try {
        const data = parseTrackerHTML(await file.text())
        if (!data.project) throw new Error('Missing "project" field in tracker data')
        const idx = projects.findIndex(p => p.project === data.project)
        if (idx >= 0) projects[idx] = data
        else projects.push(data)
        added++
      } catch(e) {
        alert(`Could not read ${file.name}:\n${e.message}`)
      }
    }
    if (added > 0) { save(projects); render() }
  }

  // File input
  document.getElementById('file-input').addEventListener('change', e => {
    handleFiles(e.target.files)
    e.target.value = ''
  })

  // Drag and drop
  const overlay = document.getElementById('drop-overlay')
  let dragDepth = 0
  document.addEventListener('dragenter', e => {
    if ([...( e.dataTransfer?.items || [])].some(i => i.kind === 'file')) {
      dragDepth++
      overlay.style.display = 'flex'
    }
  })
  document.addEventListener('dragleave', () => {
    if (--dragDepth <= 0) { dragDepth = 0; overlay.style.display = 'none' }
  })
  document.addEventListener('dragover', e => e.preventDefault())
  document.addEventListener('drop', e => {
    e.preventDefault()
    dragDepth = 0
    overlay.style.display = 'none'
    handleFiles(e.dataTransfer.files)
  })

  render()
</script>
</body>
</html>
